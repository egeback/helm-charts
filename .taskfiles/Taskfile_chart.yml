---
version: '3'

tasks:

  create:
    desc: create new chart
    cmds:
    - git checkout -b add-chart-{{.CHART}}
    - cp -r {{.GIT_ROOT}}/templates/chart "{{.GIT_ROOT}}/charts/{{.CHART}}"
    - ./.bin/go-replace -s '${CHARTNAME}' -r "{{.CHART}}" --path="{{.GIT_ROOT}}/charts/{{.CHART}}" --path-pattern='*.*'
    - task: dependency
    - echo "Congratulations, charts/{{.CHART}} successfully generated, you can now edit chart informations ( Chart.yaml and values.yaml )"
    status:
    - test -d "{{.GIT_ROOT}}/charts/{{.CHART}}"
    deps:
    - check-chart
    silent: true

  dependency:
    dir: "{{.GIT_ROOT}}/charts/{{.CHART}}"
    cmds:
    - test -d Chart.lock && rm Chart.lock || exit 0
    - test -d tmpcharts && rm -rf tmpcharts || exit 0
    - helm dependency update
    silent: true

  dependency-cleanup:
    desc: clean up chart dependencies
    dir: "{{.GIT_ROOT}}/charts"
    cmds:
    - find {{.GIT_ROOT}}/charts/ -type f -name 'Chart.lock' -mindepth 1 -print0 | xargs -r -0 rm
    - find {{.GIT_ROOT}}/charts/ -type d -name 'charts' -mindepth 1 -print0 | xargs -r -0 rm -rf
    silent: true

  lint:
    desc: lint your chart code
    dir: "{{.GIT_ROOT}}/charts/{{.CHART}}"
    cmds:
    - helm lint .
    deps:
    - dependency
    - check-chart

  ct-lint:
    desc: run `ct lint` on your chart code
    cmds:
    - docker run --rm -it --user $(id -u):$(id -g) -e "HELM_CONFIG_HOME=/tmp/helm" -e "HELM_CACHE_HOME=/tmp/helm" -v {{.GIT_ROOT}}:/ci -w /ci quay.io/helmpack/chart-testing:latest ct lint --charts "charts/{{.CHART}}" --config /ci/.github/ct/ct.yaml
    deps:
    - check-chart
    - lint

  ct-install:
    desc: run `ct install` on your chart code (uses k3d-helm-test cluster only)
    cmds:
    - mkdir -p {{.GIT_ROOT}}/.kube
    - kubectl config view --context=k3d-helm-test --minify --flatten > {{.GIT_ROOT}}/.kube/config
    - defer: rm -f {{.GIT_ROOT}}/.kube/config
    - docker run --rm -it --network host --user $(id -u):$(id -g) -e "KUBECONFIG=/ci/.kube/config" -e "HELM_CONFIG_HOME=/tmp/helm" -e "HELM_CACHE_HOME=/tmp/helm" -v {{.GIT_ROOT}}:/ci -w /ci quay.io/helmpack/chart-testing:latest ct install --charts "charts/{{.CHART}}" --config /ci/.github/ct/ct.yaml
    deps:
    - check-chart
    - dependency
    - check-test-cluster

  ct-test:
    desc: full test run (lint + install) on your chart code
    cmds:
    - task: ct-lint
    - task: ct-install
    deps:
    - check-chart

  test-cluster-up:
    desc: create a local k3d cluster for testing
    cmds:
    - k3d cluster create helm-test --wait

  test-cluster-down:
    desc: delete the local k3d testing cluster
    cmds:
    - k3d cluster delete helm-test

  helm-docs:
    desc: generate helm-docs
    dir: "{{.GIT_ROOT}}/.github/scripts"
    cmds:
    - ./gen-helm-docs.sh "{{.CHART}}"
    deps:
    - check-chart

  # Checks Parameters
  check-chart:
    cmds:
    - test ! -z "{{.CHART}}" || (echo "Please define CHART parameter"; exit 1)
    silent: true

  check-test-cluster:
    desc: verify k3d helm-test cluster is running
    cmds:
    - cmd: kubectl --context k3d-helm-test cluster-info > /dev/null 2>&1 || (echo "ERROR - k3d helm-test cluster is not running. Run 'task chart:test-cluster-up' first." && exit 1)
    silent: true
